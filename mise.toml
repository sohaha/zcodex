[tools]
# 使用 bazelisk 自动管理 Bazel 版本（读取 .bazelversion）
# 详见 https://github.com/bazelbuild/bazelisk
bazelisk = "1.28.1"
rust = "1.94.0"
zig = "0.15.2"

[tasks.deps-linux]
description = "安装 Linux 系统依赖（pkg-config / openssl / libcap）"
run = "apt-get update -qq && apt-get install -y pkg-config libssl-dev libcap-dev"

[tasks.deps-zigbuild]
description = "安装 cargo-zigbuild（交叉编译公共依赖）"
run = "cargo install cargo-zigbuild"

[tasks.deps-macos-arm64]
description = "安装 macOS ARM64 交叉编译依赖（osxcross + rust target）"
run = """
apt-get update -qq && apt-get install -y \
  clang cmake git patch python3 \
  libssl-dev libxml2-dev liblzma-dev zlib1g-dev

[ -d /opt/osxcross ] || git clone https://github.com/tpoechtrager/osxcross /opt/osxcross
mkdir -p /opt/osxcross/tarballs

# 若没有 SDK tarball，自动下载 MacOSX11.3 SDK（phracker/MacOSX-SDKs）
if ! ls /opt/osxcross/tarballs/*.sdk.tar.* 2>/dev/null; then
  curl -L https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX11.3.sdk.tar.xz \
    -o /opt/osxcross/tarballs/MacOSX11.3.sdk.tar.xz
fi

[ -d /opt/osxcross/target ] || \
  (cd /opt/osxcross && SDK_VERSION=11.3 OSX_VERSION_MIN=11.0 UNATTENDED=1 bash build.sh)

rustup target add aarch64-apple-darwin
"""

[tasks.deps-win-amd64]
depends = ["deps-zigbuild"]
description = "安装 Windows AMD64 交叉编译依赖"
run = "rustup target add x86_64-pc-windows-gnu"

[tasks.build]
description = "编译当前系统开发版"
dir = "{{config_root}}/codex-rs"
run = "cargo build"

[tasks.release]
description = "编译当前系统正式版"
dir = "{{config_root}}/codex-rs"
run = "cargo build --release"

[tasks.build-macos-arm64]
depends = ["deps-macos-arm64"]
description = "交叉编译 macOS ARM64 开发版"
dir = "{{config_root}}/codex-rs"
env = { PATH = "/opt/osxcross/target/bin:{{env.PATH}}", CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER = "/opt/osxcross/target/bin/aarch64-apple-darwin20.4-clang", CC_aarch64_apple_darwin = "/opt/osxcross/target/bin/aarch64-apple-darwin20.4-clang", CXX_aarch64_apple_darwin = "/opt/osxcross/target/bin/aarch64-apple-darwin20.4-clang++", AR_aarch64_apple_darwin = "/opt/osxcross/target/bin/aarch64-apple-darwin20.4-ar" }
run = "cargo build --target aarch64-apple-darwin"

[tasks.release-macos-arm64]
depends = ["deps-macos-arm64"]
description = "交叉编译 macOS ARM64 正式版"
dir = "{{config_root}}/codex-rs"
env = { PATH = "/opt/osxcross/target/bin:{{env.PATH}}", CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER = "/opt/osxcross/target/bin/aarch64-apple-darwin20.4-clang", CC_aarch64_apple_darwin = "/opt/osxcross/target/bin/aarch64-apple-darwin20.4-clang", CXX_aarch64_apple_darwin = "/opt/osxcross/target/bin/aarch64-apple-darwin20.4-clang++", AR_aarch64_apple_darwin = "/opt/osxcross/target/bin/aarch64-apple-darwin20.4-ar" }
run = "cargo build --target aarch64-apple-darwin --release"

[tasks.build-win-amd64]
depends = ["deps-win-amd64"]
description = "交叉编译 Windows AMD64 开发版"
dir = "{{config_root}}/codex-rs"
run = "cargo zigbuild --target x86_64-pc-windows-gnu"

[tasks.release-win-amd64]
depends = ["deps-win-amd64"]
description = "交叉编译 Windows AMD64 正式版"
dir = "{{config_root}}/codex-rs"
run = "cargo zigbuild --target x86_64-pc-windows-gnu --release"
