[tasks.build-clean]
description = "清理构建 codex CLI，忽略所有缓存确保最新产物"
run = "mise run build --clean"

[tasks.codex-watch-tools]
description = "监控 codex-tui.log 中的工具调用"
run = '''
log_file="${CODEX_WATCH_LOG_FILE:-$HOME/.codex/log/codex-tui.log}"
RIPGREP_CONFIG_PATH=/dev/null tail -F "$log_file" \
| RIPGREP_CONFIG_PATH=/dev/null rg --line-buffered 'ToolCall: (shell_command|tldr|web|apply_patch)|embedded ZTOK|native-tldr|tldr begin|tldr end'
'''

[tasks.codex-watch-tldr]
description = "监控 codex-tui.log 中的 tldr 调用"
run = '''
log_file="${CODEX_WATCH_LOG_FILE:-$HOME/.codex/log/codex-tui.log}"
RIPGREP_CONFIG_PATH=/dev/null tail -F "$log_file" \
| RIPGREP_CONFIG_PATH=/dev/null rg --line-buffered 'ToolCall: tldr |tldr begin|tldr end'
'''

[tasks.codex-watch-ztok]
description = "监控 codex-tui.log 中的嵌入式 ZTOK 路由"
run = '''
log_file="${CODEX_WATCH_LOG_FILE:-$HOME/.codex/log/codex-tui.log}"
RIPGREP_CONFIG_PATH=/dev/null tail -F "$log_file" \
| RIPGREP_CONFIG_PATH=/dev/null rg --line-buffered 'shell_command routed via embedded ZTOK|rewritten: .*codex ztok|command is not in the embedded ZTOK allowlist|embedded ZTOK rewriter'
'''

[tasks.windows-cross-check]
description = "在当前环境做 Windows target 交叉编译检查（native-tldr + cli）"
run = "just windows-cross-check"

[tools]
just = "latest"
