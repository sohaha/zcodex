name: ci

on:
  pull_request: {}
  push: { branches: [main] }
  workflow_dispatch: {}

jobs:
  changed:
    name: Detect installer changes
    runs-on: ubuntu-latest
    outputs:
      installer: ${{ steps.detect.outputs.installer }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha='${{ github.event.pull_request.base.sha }}'
            head_sha='${{ github.event.pull_request.head.sha }}'
            mapfile -t files < <(git diff --name-only --no-renames "$base_sha" "$head_sha")
          else
            base_sha='${{ github.event.before }}'
            head_sha='${{ github.sha }}'
            if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              files=("scripts/install/install.ps1" "scripts/install/install.sh" "README.md" "docs/install.md")
            else
              mapfile -t files < <(git diff --name-only --no-renames "$base_sha" "$head_sha")
            fi
          fi

          installer=false
          for f in "${files[@]}"; do
            case "$f" in
              .github/workflows/ci.yml|README.md|docs/install.md|scripts/install/install.ps1|scripts/install/install.sh) installer=true ;;
            esac
          done

          echo "installer=$installer" >> "$GITHUB_OUTPUT"

  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify codex-rs Cargo manifests inherit workspace settings
        run: python3 .github/scripts/verify_cargo_workspace_manifests.py

      - name: Verify codex-tui does not import codex-core directly
        run: python3 .github/scripts/verify_tui_core_boundary.py

      - name: Verify Bazel clippy flags match Cargo workspace lints
        run: python3 .github/scripts/verify_bazel_clippy_lints.py

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # stage_npm_packages.py requires DotSlash when staging releases.
      - uses: facebook/install-dotslash@v2
        if: ${{ github.repository == 'openai/codex' }}

      - name: Stage npm package
        id: stage_npm_package
        if: ${{ github.repository == 'openai/codex' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Use a rust-release version that includes all native binaries.
          CODEX_VERSION=0.115.0
          OUTPUT_DIR="${RUNNER_TEMP}"
          python3 ./scripts/stage_npm_packages.py \
            --release-version "$CODEX_VERSION" \
            --package codex \
            --output-dir "$OUTPUT_DIR"
          PACK_OUTPUT="${OUTPUT_DIR}/codex-npm-${CODEX_VERSION}.tgz"
          echo "pack_output=$PACK_OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Upload staged npm package artifact
        uses: actions/upload-artifact@v6
        if: ${{ github.repository == 'openai/codex' }}
        with:
          name: codex-npm-staging
          path: ${{ steps.stage_npm_package.outputs.pack_output }}

      - name: Ensure root README.md contains only ASCII and certain Unicode code points
        run: ./scripts/asciicheck.py README.md
      - name: Check root README ToC
        run: python3 scripts/readme_toc.py README.md

      - name: Prettier (run `pnpm run format:fix` to fix)
        run: pnpm run format

  installer-smoke:
    name: installer-smoke (${{ matrix.os }})
    needs: changed
    if: ${{ needs.changed.outputs.installer == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Smoke test install.sh (local server)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          install_dir="${tmp}/bin"
          server_root="${tmp}/server"
          package_root="${tmp}/package"
          vendor_root="${package_root}/package/vendor/x86_64-unknown-linux-musl"
          mkdir -p "$server_root" "$vendor_root/codex" "$vendor_root/path"
          cp scripts/install/install.sh "${server_root}/install.sh"

          cat > "${vendor_root}/codex/codex" <<'EOF'
          #!/usr/bin/env bash
          echo codex-linux
          EOF
          chmod +x "${vendor_root}/codex/codex"
          cat > "${vendor_root}/path/rg" <<'EOF'
          #!/usr/bin/env bash
          echo rg-linux
          EOF
          chmod +x "${vendor_root}/path/rg"
          tar -czf "${server_root}/codex-npm-linux-x64-0.0.0.tgz" -C "$package_root" package

          port="$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')"
          python3 -m http.server "$port" --bind 127.0.0.1 --directory "$server_root" >/dev/null 2>&1 &
          pid=$!
          trap 'kill "$pid" || true' EXIT

          for _ in {1..50}; do
            if curl -fsS "http://127.0.0.1:$port/" >/dev/null 2>&1; then
              break
            fi
            sleep 0.1
          done

          CODEX_BASE_URL="http://127.0.0.1:$port" CODEX_INSTALL_DIR="$install_dir" bash -c "curl -fsSL http://127.0.0.1:$port/install.sh | sh -s -- 0.0.0"
          test -x "${install_dir}/codex"
          test -x "${install_dir}/rg"
          [[ "$("${install_dir}/codex")" == "codex-linux" ]]
          [[ "$("${install_dir}/rg")" == "rg-linux" ]]

      - name: Smoke test install.ps1 (local server)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $target = 'x86_64-pc-windows-msvc'
          $tempRoot = Join-Path $env:RUNNER_TEMP ("codex-installer-" + [System.Guid]::NewGuid().ToString())
          $assetsDir = Join-Path $tempRoot 'assets'
          $packageRoot = Join-Path $tempRoot 'package'
          $vendorRoot = Join-Path $packageRoot "package\\vendor\\$target"
          $installDir = Join-Path $tempRoot 'install'

          New-Item -ItemType Directory -Path $assetsDir -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $vendorRoot 'codex') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $vendorRoot 'path') -Force | Out-Null
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          Copy-Item scripts/install/install.ps1 (Join-Path $assetsDir "install.ps1") -Force
          Set-Content -Path (Join-Path $vendorRoot 'codex\codex.exe') -Value 'codex-win' -NoNewline
          Set-Content -Path (Join-Path $vendorRoot 'codex\codex-command-runner.exe') -Value 'runner-win' -NoNewline
          Set-Content -Path (Join-Path $vendorRoot 'codex\codex-windows-sandbox-setup.exe') -Value 'sandbox-win' -NoNewline
          Set-Content -Path (Join-Path $vendorRoot 'path\rg.exe') -Value 'rg-win' -NoNewline

          $tgzPath = Join-Path $assetsDir 'codex-npm-win32-x64-0.0.0.tgz'
          if (Test-Path $tgzPath) { Remove-Item -Force $tgzPath }
          Push-Location $packageRoot
          tar -czf $tgzPath package
          Pop-Location

          $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Loopback, 0)
          $listener.Start()
          $port = $listener.LocalEndpoint.Port
          $listener.Stop()
          $server = Start-Process -FilePath python -ArgumentList @("-m", "http.server", "$port", "--bind", "127.0.0.1", "--directory", "$assetsDir") -PassThru -NoNewWindow
          try {
            for ($i = 0; $i -lt 50; $i++) {
              try {
                Invoke-WebRequest -Uri "http://127.0.0.1:$port/" -UseBasicParsing | Out-Null
                break
              } catch {
                Start-Sleep -Milliseconds 100
              }
            }

            $env:CODEX_BASE_URL = "http://127.0.0.1:$port"
            $env:CODEX_INSTALL_DIR = $installDir
            $downloadedScript = Join-Path $tempRoot 'downloaded-install.ps1'
            Invoke-WebRequest -Uri "http://127.0.0.1:$port/install.ps1" -OutFile $downloadedScript
            & pwsh -NoProfile -File $downloadedScript 0.0.0

            if (!(Test-Path (Join-Path $installDir "codex.exe"))) { throw "codex.exe not installed" }
            if (!(Test-Path (Join-Path $installDir "codex-command-runner.exe"))) { throw "codex-command-runner.exe not installed" }
            if (!(Test-Path (Join-Path $installDir "codex-windows-sandbox-setup.exe"))) { throw "codex-windows-sandbox-setup.exe not installed" }
            if (!(Test-Path (Join-Path $installDir "rg.exe"))) { throw "rg.exe not installed" }
          } finally {
            try { if ($server -and -not $server.HasExited) { $server.Kill() } } catch {}
            Remove-Item Env:\CODEX_BASE_URL -ErrorAction SilentlyContinue
            Remove-Item Env:\CODEX_INSTALL_DIR -ErrorAction SilentlyContinue
            if (Test-Path $tempRoot) { Remove-Item -Recurse -Force $tempRoot }
          }
