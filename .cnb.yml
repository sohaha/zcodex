

.tag-release-codex: &tag-release-codex
  docker:
    image: docker.cnb.cool/zls-tools/vm/rust:latest
    volumes:
      - /root/.cargo/registry:copy-on-write
      - /root/.cargo/git:copy-on-write
      - /root/.rustup:copy-on-write
      - /root/.cache:copy-on-write
      - /root/.local/share/mise:copy-on-write
  runner:
    tags: cnb:arch:amd64
    cpus: 30
  env:
    GITHUB_REPOSITORY: sohaha/zcodex
  stages:
    - name: build linux amd64
      timeout: 2h
      script: |
        set -eu
        (set -o pipefail) 2>/dev/null && set -o pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-linux-amd64
    - name: build macos arm64
      timeout: 2h
      script: |
        set -eu
        (set -o pipefail) 2>/dev/null && set -o pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-macos-arm64
    - name: build windows amd64
      timeout: 2h
      script: |
        set -eu
        (set -o pipefail) 2>/dev/null && set -o pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-win-amd64
    - name: build windows arm64
      timeout: 2h
      script: |
        set -eu
        (set -o pipefail) 2>/dev/null && set -o pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-win-arm64
    - name: upload github release assets
      timeout: 30m
      script: |
        set -eu
        (set -o pipefail) 2>/dev/null && set -o pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        bash ./scripts/cnb_upload_codex_release.sh

include:
  - https://cnb.cool/zls-tools/vm/-/blob/main/tools/sync-github-sohaha.yml
  # - https://cnb.cool/zls-tools/vm/-/blob/main/tools/knowledge.yml
  - https://cnb.cool/zls-tools/vm/-/blob/main/rust-ide.yml
  - https://cnb.cool/zls-tools/vm/-/blob/main/npc.yml
  # - https://cnb.cool/zls-tools/vm/-/blob/main/tools/install-tools.yml

v*.*.*:
  tag_push:
    - <<: *tag-release-codex


$:
  push:
    sync_github:
      env:
          BRANCHS: main
  vscode:
      clouddev:
          imports: https://cnb.cool/zls-tools/env/-/blob/main/envs.yml
          docker:
              image: docker.cnb.cool/zls-tools/vm/rust:latest
              volumes:
                - /root/.cargo/registry:copy-on-write
                - /root/.cargo/git:copy-on-write
                - /root/.rustup:copy-on-write
                - /root/.cache:copy-on-write
                - /root/.local/bin:copy-on-write
                - /root/.local/share/mise:copy-on-write
          env:
              CARGO_TARGET_DIR: /workspace/.cargo-target
              CARGO_INCREMENTAL: "1"
              RUSTC_WRAPPER: sccache
              SCCACHE_DIR: /workspace/.cache/sccache
              SCCACHE_CACHE_SIZE: 50G
              CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold
          runner:
              tags: cnb:arch:amd64
              cpus: 25
          stages:
            - name: restore codex home backup
              script: |
                set -eu
                codex_home="${HOME:-/root}/.codex"
                backup_dir="/workspace/backup/codex"
                backup_archive="$backup_dir/codex.tar.gz"
                if [ -f "$backup_archive" ]; then
                  mkdir -p "$codex_home"
                  tar -xzf "$backup_archive" -C "$codex_home"
                fi
            - name: bootstrap rust speedup
              script: |
                set -eu
                export PATH="/root/.local/bin:/root/.cargo/bin:$PATH"
                export DEBIAN_FRONTEND=noninteractive
                if ! command -v mold >/dev/null 2>&1; then
                  apt-get update
                  apt-get install -y mold
                fi
                if ! command -v sccache >/dev/null 2>&1; then
                  cargo install sccache --root /root/.local
                fi
                mkdir -p /workspace/.cargo-target /workspace/.cache/sccache
            - name: build
              script: |
                set -eu
                mise run build &
          endStages:
            - name: backup codex home
              script: |
                set -eu
                codex_home="${HOME:-/root}/.codex"
                backup_dir="/workspace/backup/codex"
                backup_archive="$backup_dir/codex.tar.gz"
                session_max_age_days=7
                if [ ! -d "$codex_home" ]; then
                  exit 0
                fi
                rm -rf "$backup_dir"
                mkdir -p "$backup_dir"
                (
                  cd "$codex_home"
                  {
                    find . \
                      \( -path './log' -o -path './log/*' \
                      -o -path './tmp' -o -path './tmp/*' \
                      -o -path './.tmp' -o -path './.tmp/*' \
                      -o -path './sessions' -o -path './sessions/*' \) -prune \
                      -o -print0
                    if [ -d ./sessions ]; then
                      find ./sessions \( -type f -o -type l \) -mtime "-$session_max_age_days" -print0
                    fi
                  } | tar --null -T - -czf "$backup_archive"
                )
