.tag-release-codex: &tag-release-codex
  docker:
    image: ubuntu:24.04
    volumes:
      - /root/.cargo/registry:copy-on-write
      - /root/.cargo/git:copy-on-write
      - /root/.rustup:copy-on-write
      - /root/.cache:copy-on-write
      - /root/.local/share/mise:copy-on-write
  runner:
    tags: cnb:arch:amd64
    cpus: 20
  env:
    GITHUB_REPOSITORY: sohaha/zcodex
  stages:
    - name: prepare release toolchain
      script: |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y --no-install-recommends \
          build-essential \
          ca-certificates \
          clang \
          curl \
          git \
          jq \
          libcap-dev \
          libclang-dev \
          libssl-dev \
          lld \
          pkg-config \
          python3 \
          xz-utils

        if ! command -v gh >/dev/null 2>&1; then
          apt-get install -y --no-install-recommends gh || true
        fi

        if ! command -v gh >/dev/null 2>&1; then
          arch="$(dpkg --print-architecture)"
          case "$arch" in
            amd64)
              gh_arch="amd64"
              ;;
            arm64)
              gh_arch="arm64"
              ;;
            *)
              echo "unsupported gh architecture: $arch" >&2
              exit 1
              ;;
          esac
          gh_version="2.76.2"
          gh_archive="gh_${gh_version}_linux_${gh_arch}.tar.gz"
          gh_url="https://github.com/cli/cli/releases/download/v${gh_version}/${gh_archive}"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          curl -fsSL "$gh_url" -o "$tmp_dir/$gh_archive"
          tar -xzf "$tmp_dir/$gh_archive" -C "$tmp_dir"
          install "$tmp_dir/gh_${gh_version}_linux_${gh_arch}/bin/gh" /usr/local/bin/gh
        fi

        if ! command -v rustup >/dev/null 2>&1; then
          curl -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal
        fi

        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        rustup toolchain install stable --profile minimal --no-self-update
        rustup default stable

        if ! command -v mise >/dev/null 2>&1; then
          curl -fsSL https://mise.run | sh
        fi

        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        rustup --version
        cargo --version
        mise --version
        gh --version
    - name: build linux amd64
      timeout: 2h
      script: |
        set -euo pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-linux-amd64
    - name: build macos arm64
      timeout: 2h
      script: |
        set -euo pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-macos-arm64
    - name: build windows amd64
      timeout: 2h
      script: |
        set -euo pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-win-amd64
    - name: build windows arm64
      timeout: 2h
      script: |
        set -euo pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-win-arm64
    - name: upload github release assets
      timeout: 30m
      script: |
        set -euo pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        bash ./scripts/cnb_upload_codex_release.sh

include:
  - https://cnb.cool/zls-tools/vm/-/blob/main/tools/sync-github-sohaha.yml
  - https://cnb.cool/zls-tools/vm/-/blob/main/rust-ide.yml

rust-v*.*.*:
  tag_push:
    - <<: *tag-release-codex

v*.*.*:
  tag_push:
    - <<: *tag-release-codex

$:
  push:
    sync_github:
      env:
          BRANCHS: main
  vscode:
      clouddev:
          imports: https://cnb.cool/zls-tools/env/-/blob/main/envs.yml
          runner:
              tags: cnb:arch:amd64
              cpus: 20
