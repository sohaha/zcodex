

.tag-release-codex: &tag-release-codex
  docker:
    image: docker.cnb.cool/zls-tools/vm/rust:latest
    volumes:
      - /root/.cargo/registry:copy-on-write
      - /root/.cargo/git:copy-on-write
      - /root/.rustup:copy-on-write
      - /root/.cache:copy-on-write
      - /root/.local/share/mise:copy-on-write
  runner:
    tags: cnb:arch:amd64
    cpus: 30
  env:
    GITHUB_REPOSITORY: sohaha/zcodex
  stages:
    - name: build linux amd64
      timeout: 2h
      script: |
        set -eu
        (set -o pipefail) 2>/dev/null && set -o pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-linux-amd64
    - name: build macos arm64
      timeout: 2h
      script: |
        set -eu
        (set -o pipefail) 2>/dev/null && set -o pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-macos-arm64
    - name: build windows amd64
      timeout: 2h
      script: |
        set -eu
        (set -o pipefail) 2>/dev/null && set -o pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-win-amd64
    - name: build windows arm64
      timeout: 2h
      script: |
        set -eu
        (set -o pipefail) 2>/dev/null && set -o pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        mise run build ubuntu-win-arm64
    - name: upload github release assets
      timeout: 30m
      script: |
        set -eu
        (set -o pipefail) 2>/dev/null && set -o pipefail
        export PATH="/root/.cargo/bin:/root/.local/bin:$PATH"
        bash ./scripts/cnb_upload_codex_release.sh

include:
  - https://cnb.cool/zls-tools/vm/-/blob/main/tools/sync-github-sohaha.yml
  # - https://cnb.cool/zls-tools/vm/-/blob/main/tools/knowledge.yml
  - https://cnb.cool/zls-tools/vm/-/blob/main/rust-ide.yml
  # - https://cnb.cool/zls-tools/vm/-/blob/main/tools/install-tools.yml

v*.*.*:
  tag_push:
    - <<: *tag-release-codex

env:
  dockerPassword: ${CNB_TOKEN_SECRET}
secrets:
  - CNB_TOKEN_SECRET

.npc: &npc
  - stages:
      - name: run with npc
        # imports: https://cnb.cool/zls-tools/env/-/blob/main/docker.yml
        image:
              name: docker.cnb.cool/zls-tools/vm/rust:latest
              dockerUser: $CNB_TOKEN_USER_NAME
              dockerPassword: $CNB_TOKEN
        env:
          CUSTOM_PROMPT: |
            你是一位资深工程师，擅长并发模型和性能优化。
        # stages:
        #   - name: 安装工具
        #     jobs: !reference [.install-tools]


# $ 是兜底配置，匹配所有未单独定义的 NPC
$:
  issue.comment@npc: *npc
  pull_request.comment@npc: *npc

  push:
    sync_github:
      env:
          BRANCHS: main
  vscode:
      clouddev:
          imports: https://cnb.cool/zls-tools/env/-/blob/main/envs.yml
          env:
              CARGO_TARGET_DIR: /workspace/.cargo-target
              CARGO_INCREMENTAL: "1"
              RUSTC_WRAPPER: sccache
              SCCACHE_DIR: /workspace/.cache/sccache
              SCCACHE_CACHE_SIZE: 50G
              CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold
          runner:
              tags: cnb:arch:amd64
              cpus: 20
          stages:
            - name: bootstrap rust speedup
              script: |
                set -eu
                export DEBIAN_FRONTEND=noninteractive
                if ! command -v mold >/dev/null 2>&1 || ! command -v sccache >/dev/null 2>&1; then
                  apt-get update
                  apt-get install -y mold sccache
                fi
                mkdir -p /workspace/.cargo-target /workspace/.cache/sccache
            - name: link codex session
              script: |
                set -eu
                mkdir -p /root/.cnb/codex-session/zcodex
                mkdir -p /root/.codex
                ln -sfn /root/.cnb/codex-session/zcodex /root/.codex/session
