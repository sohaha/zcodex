title = "稳定 resize 后 inline viewport 的定位与重绘"
scope = """
修改 `codex-rs/tui/src/tui.rs` 中与 resize 相关的 viewport 重定位路径，去掉对不可靠光标位移启发式的单点依赖，并补充覆盖“resize 发生但 cursor 反馈不可信或未变化”场景的回归测试。必要时更新与该行为直接相关的快照或测试辅助代码。

不包括 buddy/宠物功能改动，不包括非 resize 触发的其他渲染问题，也不包括对 tmux 做独立兼容层或大规模 TUI 重构。
"""
