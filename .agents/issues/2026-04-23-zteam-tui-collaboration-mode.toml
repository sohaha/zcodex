done_when = "TUI 中存在稳定的 ZTeam 入口与模式开关，`tui.zteam_enabled` 默认值为 true，显式关闭后 ZTeam 入口和相关提示不再暴露，同时配置链路与 schema 保持一致"
validate_by = "优先运行 `cd codex-rs && cargo nextest run -p codex-core config` 与 `cd codex-rs && cargo nextest run -p codex-tui zteam`；若本地未安装 cargo-nextest，则改为 `cargo test -p codex-core config` 与 `cargo test -p codex-tui zteam`。完成后执行 `cd codex-rs && just write-config-schema` 并确认 schema 同步"
regress_by = "优先运行 `cd codex-rs && cargo nextest run -p codex-core config && cargo nextest run -p codex-tui`；若本地未安装 cargo-nextest，则改为对应的 `cargo test`"
regress_timing = "before_fanout"
status = "done"
validate_status = "passed"
regress_status = "passed"
notes = "2026-04-23：a1 完成。已新增 `[tui].zteam_enabled`（默认 true），并以 `/zteam` 作为本地 ZTeam 的唯一表面入口；关闭后命令列表与命令解析同步隐藏，避免半禁用状态。验证通过：`env -u RUSTC_WRAPPER cargo test -p codex-core --lib config`、`env -u RUSTC_WRAPPER cargo test -p codex-tui zteam`、`env -u RUSTC_WRAPPER cargo test -p codex-tui`、`env -u RUSTC_WRAPPER just write-config-schema`。补充：`cargo test -p codex-core config` 当前会被仓库既有的 `core/tests/suite/zmemory_e2e.rs` 中 `rusqlite` 编译错误阻断，因此本轮对配置链路使用了 `--lib` 定向取证。"

