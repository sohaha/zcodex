包含模式命名落地、入口显隐逻辑、`tui.zteam_enabled` 默认值、关闭后的禁用行为，以及必要的 schema/配置链路刷新；
不在本 issue 中实现双 worker 编排、工作台 UI、恢复逻辑或 federation adapter。
"""
touch_points = ["module:codex-tui", "module:codex-core", "path:codex-rs/tui/src/**", "path:codex-rs/core/src/config/**", "schema:codex-rs/core/config.schema.json"]
