plan = ".agents/plan/2026-04-15-ztldr-lang-optional.md"

[[issue]]

id = "a1"
sequence = 10
title = "CLI 子命令 --lang 改为可选 + 后缀推断"

scope = """
将 codex-rs/cli/src/tldr_cmd.rs 中 TldrAnalyzeCommand、TldrImportersCommand、TldrSemanticCommand、TldrChangeImpactCommand 的 --lang 字段从 CliLanguage（必需）改为 Option<CliLanguage>（可选）。\n\n改动后的推断逻辑：\n- 显式传递 --lang → 直接使用\n- 未传递 + 有路径参数 → SupportedLanguage::from_path() 推断\n- 未传递 + 无路径或推断失败 → 报错提示显式传 --lang\n\nChangeImpact 特殊：无 --lang 时从 paths[0] 推断。\n\n不修改工具 description、用法提示词、帮助文本中的描述性文案。"""

touch_points = ["module:codex-cli", "command:tldr"]
depends_on = []
done_when = "所有四个 CLI struct 的 --lang 改为 Option<CliLanguage>，对应 run_* 函数处理 None 分支（从 path 推断或报错），cargo nextest run -p codex-cli --test tldr 通过"
validate_by = "cargo nextest run -p codex-cli --test tldr"
regress_by = "cargo nextest run -p codex-native-tldr"
regress_timing = "after_done"
status = "todo"
validate_status = "not_run"
regress_status = "not_run"
notes = "none"

