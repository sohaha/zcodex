同时让 `core` 对外显式暴露本次结果是否来自 `local fallback`，而不是仅写入内部 `auto_tldr_context`。
本 issue 只处理 `core` 的降级语义与 warm 判定，不扩大普通分析动作的 auto-start 范围。
"""
