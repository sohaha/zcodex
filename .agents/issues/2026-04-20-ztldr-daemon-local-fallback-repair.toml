validate_by = "cd /workspace/codex-rs && cargo test -p codex-core tldr"
regress_by = "none"
regress_timing = "after_done"
status = "done"
validate_status = "passed"
regress_status = "not_needed"
notes = "已完成实现：core 现会把 source=local 正规化为 degradedMode=local_fallback，warm 只在 success 且未 degraded 时记成功。验证已通过：`cd /workspace/codex-rs && env -u RUSTC_WRAPPER cargo test -p codex-core tldr`。为跑通官方验证，本轮同步收敛了与本命令直接冲突的旧 unit-test 接口漂移。"

