[[issue]]
id = "a11"
sequence = 110
title = "为高价值 wrapper 落地垂直摘要模板"
scope = """
本 issue 负责在共享压缩底座、类型感知 near-diff 与策略级配置稳定后，为少量高价值 wrapper 提供更贴近任务语义的垂直摘要模板。

包括：
1. 为 `git`、`cargo`、`pytest`、`kubectl`、`docker` 等高价值 wrapper 选择性落地垂直模板
2. 保证垂直模板建立在统一共享底座之上，而不是形成另一套平行实现
3. 让这些模板继续遵守 basic/enhanced、dedup / near-diff 与调试视图合同

不包括：
- 一次性为全部 wrapper 写模板
- 用垂直模板取代已经稳定的共享压缩底座
- 为外部产品面提供独立 UI、仪表盘或历史分析
"""
touch_points = ["module:codex-ztok", "command:ztok git", "command:ztok cargo", "command:ztok pytest", "command:ztok kubectl", "command:ztok docker", "codex-rs/ztok/src/*_cmd.rs", "codex-rs/ztok/src/container.rs", "codex-rs/cli/tests/ztok.rs"]
depends_on = ["a4", "a5", "a8", "a9", "a10"]
done_when = "选定的高价值 wrapper 拥有建立在共享底座之上的垂直摘要模板，输出更贴近任务语义，且不会绕开 `basic` / `enhanced`、dedup / near-diff 与调试视图的统一合同。"
