在放开渲染层和配置层改动前，重新运行 buddy 模型与状态转移的定向测试，确认骨架推导和运行态边界未被后续接线破坏；重新运行 /buddy 命令测试、交互测试与关联 snapshot，确认命令列表、分发逻辑和视觉反馈保持一致
"""
regress_timing = "after_done"
status = "done"
