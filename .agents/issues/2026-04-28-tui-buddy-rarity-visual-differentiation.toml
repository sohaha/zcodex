[[issue]]
id = "a1"
sequence = 10
title = "强化 TUI Buddy 的稀有度视觉分层"
scope = """
让 Buddy 的稀有度（Common、Uncommon、Rare、Epic、Legendary）在视觉上具有稳定、可辨认、逐级增强的差异，而不只是颜色和星级区分。包含：
1. 在 `model.rs` 中定义 rarity 到视觉层的稳定派生 contract（装饰层、轮廓层、文案层映射）
2. 在 `render.rs` 中实现 full sprite 和 compact 视图的 rarity-driven 差异（ Legendary 必须有专属视觉信号）
3. 在 `mod.rs` 中更新 status 文案与造型特征描述，使其与视觉 contract 一致
4. 更新 Buddy snapshots 与定向测试

不改变 rarity 概率、seed、species 列表或 AI Soul 链路；不把稀有度改成可培养升级系统。
"""
touch_points = ["module:codex-tui", "codex-rs/tui/src/buddy/model.rs", "codex-rs/tui/src/buddy/render.rs", "codex-rs/tui/src/buddy/mod.rs", "codex-rs/tui/src/buddy/snapshots/*", "codex-rs/tui/src/chatwidget/tests/*"]
depends_on = []
done_when = """
在宽屏 full sprite 和窄屏 compact 视图中，稀有度都能体现出明确的分层信号；Legendary 与 Epic 的视觉表现明显高于 Rare 以下，不需要进入 /buddy status 也能一眼识别；Legendary 拥有专属视觉信号（不只是一起复用 shiny_style 的颜色粗体）；至少一类"造型差异"直接由 rarity 驱动；/buddy show|full|pet|hide|status 现有语义保持不变；Buddy 相关 snapshot 和定向测试更新完成；Rust 代码按仓库规范格式化
"""
validate_by = """
在 `codex-rs` 目录运行：
1. `cargo test -p codex-tui buddy::tests -- --nocapture`
2. `cargo test -p codex-tui slash_buddy_status_reports_traits -- --exact --nocapture`
3. `just fmt`
4. `cargo insta pending-snapshots -p codex-tui`（审阅并接受 Buddy 相关快照）

