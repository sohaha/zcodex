[[issue]]
id = "a1"
sequence = 10
title = "新增 `codex zoffsec` 启动入口并为会话写入 zoffsec 标记"
scope = """
本 issue 负责在 `codex` CLI 中新增 `zoffsec` 命令族的启动入口，使用户可直接通过 `codex zoffsec` 启动带 offsec 指令的新会话，而不需要预先执行 install 或手工修改 `config.toml`。

包括：CLI 参数与帮助文本接线、多套内置 offsec prompt 模板资产接入、如 `--template <name>` 的模板选择参数、启动时 base instructions / model instructions override 方案、以及可供后续 `zoffsec clean` / `zoffsec resume` 识别的稳定会话标记。
不包括 rollout 历史清理，不包括 `zoffsec resume` 的恢复逻辑，也不包括普通 `codex resume` 的行为修改。
"""
touch_points = ["module:cli", "command:codex zoffsec", "flag:--template", "codex-rs/cli/src/main.rs", "codex-rs/cli/src/zoffsec_cmd.rs", "codex-rs/cli/src/zoffsec_config.rs", "codex-rs/core/src/codex.rs", "codex-rs/protocol", "codex-rs/core/tests/suite/cli_stream.rs"]
depends_on = []
done_when = "`codex zoffsec` 可在隔离 `CODEX_HOME` 下直接启动带所选内置模板对应 offsec 指令的新会话，帮助文本中可见模板切换参数，且新 rollout 会话中包含后续恢复链路可识别的 zoffsec 标记与模板标识。"
validate_by = "cd /workspace/codex-rs && env -u RUSTC_WRAPPER cargo test -p codex-cli zoffsec && env -u RUSTC_WRAPPER cargo test -p codex-core --test all exec_cli_profile_applies_model_instructions_file --quiet"
regress_by = "none"
regress_timing = "after_done"
status = "done"
validate_status = "passed"
regress_status = "not_needed"
notes = "重点确认模板名受控、帮助文本清晰、zoffsec 标记落点稳定且不污染普通 `codex` 会话；若需扩展 session meta 或 rollout 字段，必须同时评估兼容性与读取路径。\n2026-04-09 Execution：PASS。新增 `codex zoffsec` 启动入口与 `default`/`web`/`reverse` 三套内置模板，启动时通过 `base_instructions` 覆盖注入显式 zoffsec 头标记（`<!-- codex-zoffsec marker=codex-zoffsec template=... -->`），避免扩展 protocol/core 元数据链路。验证已通过 `cargo test -p codex-cli zoffsec`、`cargo nextest run -p codex-core --test all exec_cli_profile_applies_model_instructions_file` 与新增的 `cargo nextest run -p codex-core --test all exec_cli_persists_zoffsec_marker_in_session_meta`。Capability 适配：使用了 `llmdoc` 与 `ztldr`；其余为 none-applicable。\n2026-04-19 Audit：该 issue 记录的是本地原生命令实现，不应回溯性表述为“已与 upstream 精确对齐”；当前可被审计确认的 upstream selective sync 仅覆盖 rollout cleaner。"

[[issue]]
id = "a2"
sequence = 20
title = "为 Codex rollout 提供 `zoffsec clean` 的拒绝清理、预览与备份能力"
scope = """
本 issue 负责实现 `codex zoffsec clean` 的核心能力：定位目标 rollout，会话拒绝检测，替换 assistant 拒绝消息，同步清理 `event_msg` 冗余副本，并删除 `reasoning` 记录。

包括：`--last` / `--id` / `--path` 的目标选择、`--dry-run` 预览摘要、默认备份、原子写回，以及必要的拒绝检测规则。
不包括 `zoffsec resume` 的恢复入口，不包括普通 `resume` 的行为调整，也不包括 Web UI、AI 改写或多平台兼容层。
"""
touch_points = ["module:rollout", "command:codex zoffsec clean", "codex-rs/rollout/src/lib.rs", "codex-rs/rollout/src/patch.rs", "codex-rs/rollout/src/list.rs", "codex-rs/cli/src/zoffsec_cmd.rs", "codex-rs/rollout/src/tests.rs"]
depends_on = ["a1"]
done_when = "`codex zoffsec clean` 能对目标 rollout 执行拒绝检测、主消息/冗余副本替换、reasoning 删除、`--dry-run` 预览与默认备份，且清理后的会话文件可继续被现有恢复链路读取。"
validate_by = "cd /workspace/codex-rs && cargo nextest run -p codex-rollout"
regress_by = "cd /workspace/codex-rs && cargo nextest run -p codex-core --test all integration_creates_and_checks_session_file --quiet"
regress_timing = "before_fanout"
status = "done"
validate_status = "passed"
regress_status = "passed"
notes = "实现优先采用逐行 JSONL + `serde_json::Value` 定点修改，避免强类型整文件回写丢失未知字段；默认必须打印目标文件与备份路径。\n2026-04-09 Execution：PASS。新增 `codex zoffsec clean` CLI 接线，支持 `--last`/`--id`/`--path` 目标选择、`--dry-run` 预览、默认备份与拒绝替换文本覆盖。rollout 侧新增 `clean_zoffsec_rollout()`：先校验 zoffsec session marker，再在检测到 refusal 后替换 assistant `response_item` 与 `event_msg.agent_message`，并删除 reasoning 记录，最后以临时文件 + rename 原子写回。主代理本地 spec-reviewer/code-reviewer 结论均为 PASS，未发现超范围实现或明显回归缺口。验证已通过 `cargo check -p codex-cli --bin codex`、`cargo test -p codex-cli zoffsec`、`cargo nextest run -p codex-rollout`、`cargo nextest run -p codex-core --test all integration_creates_and_checks_session_file`。Capability 适配：延续本轮 `llmdoc` / `ztldr` 上下文，其余为 none-applicable。\n2026-04-19 Audit：后续对 upstream `af401d3` 的审计确认，真实 selective sync 对齐范围在 cleaner 逻辑，而不是整个 zoffsec 工作流。"

[[issue]]
id = "a3"
sequence = 30
title = "接入 `codex zoffsec resume` / `codex zoffsec r` 的 clean-then-resume 流程"
scope = """
本 issue 负责为 `zoffsec` 命令族新增恢复入口，复用现有 resume 的会话选择/恢复体验，并在选中目标会话后对 zoffsec 会话执行显式的 clean-then-resume 流程。

包括：`codex zoffsec resume` 与别名 `codex zoffsec r` 的命令接线、zoffsec 会话识别、恢复前的清理触发与可见提示、以及与 `zoffsec clean` 的能力复用。
不包括普通 `codex resume` 的 zoffsec 特化逻辑，不包括静默自动 clean，也不包括新的交互式 UI 形态。
"""
touch_points = ["module:cli", "command:codex zoffsec resume", "command:codex zoffsec r", "codex-rs/cli/src/main.rs", "codex-rs/cli/src/zoffsec_cmd.rs", "codex-rs/tui", "codex-rs/core/tests/suite/cli_stream.rs"]
depends_on = ["a1", "a2"]
done_when = "`codex zoffsec resume` / `codex zoffsec r` 可复用现有恢复体验选择会话；当目标为 zoffsec 会话时，会在用户可见的前提下执行 clean-then-resume；普通 `codex resume` 行为不回退。"
validate_by = "cd /workspace/codex-rs && env -u RUSTC_WRAPPER cargo test -p codex-cli zoffsec && env -u RUSTC_WRAPPER cargo test -p codex-tui zoffsec_resume && env -u RUSTC_WRAPPER cargo test -p codex-core --test all integration_creates_and_checks_session_file --quiet"
regress_by = "node /root/.config/lnk/.agents/skills/using-cadence/scripts/cadence_validate.js issue .agents/issues/2026-04-07-zoffsec-subcommand.toml"
regress_timing = "after_done"
status = "done"
validate_status = "passed"
regress_status = "passed"
notes = "恢复前触发 clean 必须显式、可观察、可关闭；如果无法平滑复用现有 resume 选择器，需要在执行前回看是否属于计划约定内的最小扩展。\n2026-04-09 Execution：PASS。已接入 `codex zoffsec resume` / `codex zoffsec r` 子命令，恢复参数沿用现有 resume 语义，并通过新的 `resume_zoffsec_clean` 内部标记把 clean-then-resume 逻辑下沉到 TUI 会话选择后执行。新增 `codex-rs/tui/src/zoffsec_resume.rs` 负责在选中的 resume 目标带有 zoffsec marker 时解析 rollout、执行默认备份的 `clean_zoffsec_rollout()`，普通会话则直接跳过；已补 `codex-tui` 单测覆盖 zoffsec/非 zoffsec 两条路径。后续重构阶段再补上 `codex-rs/cli/src/main.rs` 的顶层 `zoffsec` 注册与更窄的 CLI 验证。\n2026-04-19 Audit：该恢复链路是本地原生 UX 分叉，不应描述成 upstream `codex-session-patcher` 的等价实现；upstream README 仍是“清理后手动 `codex resume`”。"
