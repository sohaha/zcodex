plan = ".agents/plan/2026-04-07-ctf-subcommand.md"

[[issue]]
id = "a1"
sequence = 10
title = "新增 `codex ctf` 启动入口并为会话写入 CTF 标记"
scope = """
本 issue 负责在 `codex` CLI 中新增 `ctf` 命令族的启动入口，使用户可直接通过 `codex ctf` 启动带 CTF 指令的新会话，而不需要预先执行 install 或手工修改 `config.toml`。

包括：CLI 参数与帮助文本接线、多套内置 CTF prompt 模板资产接入、如 `--template <name>` 的模板选择参数、启动时 base instructions / model instructions override 方案、以及可供后续 `ctf clean` / `ctf resume` 识别的稳定会话标记。
不包括 rollout 历史清理，不包括 `ctf resume` 的恢复逻辑，也不包括普通 `codex resume` 的行为修改。
"""
touch_points = ["module:cli", "command:codex ctf", "flag:--template", "codex-rs/cli/src/main.rs", "codex-rs/cli/src/ctf_cmd.rs", "codex-rs/cli/src/ctf_config.rs", "codex-rs/core/src/codex.rs", "codex-rs/protocol", "codex-rs/core/tests/suite/cli_stream.rs"]
depends_on = []
done_when = "`codex ctf` 可在隔离 `CODEX_HOME` 下直接启动带所选内置模板对应 CTF 指令的新会话，帮助文本中可见模板切换参数，且新 rollout 会话中包含后续恢复链路可识别的 CTF 标记与模板标识。"
validate_by = "cd /workspace/codex-rs && cargo nextest run -p codex-cli --lib ctf && cargo nextest run -p codex-core --test all exec_cli_profile_applies_model_instructions_file --quiet"
regress_by = "none"
regress_timing = "after_done"
status = "todo"
validate_status = "not_run"
regress_status = "not_needed"
notes = "重点确认模板名受控、帮助文本清晰、CTF 标记落点稳定且不污染普通 `codex` 会话；若需扩展 session meta 或 rollout 字段，必须同时评估兼容性与读取路径。"

[[issue]]
id = "a2"
sequence = 20
title = "为 Codex rollout 提供 `ctf clean` 的拒绝清理、预览与备份能力"
scope = """
本 issue 负责实现 `codex ctf clean` 的核心能力：定位目标 rollout，会话拒绝检测，替换 assistant 拒绝消息，同步清理 `event_msg` 冗余副本，并删除 `reasoning` 记录。

包括：`--last` / `--id` / `--path` 的目标选择、`--dry-run` 预览摘要、默认备份、原子写回，以及必要的拒绝检测规则。
不包括 `ctf resume` 的恢复入口，不包括普通 `resume` 的行为调整，也不包括 Web UI、AI 改写或多平台兼容层。
"""
touch_points = ["module:rollout", "command:codex ctf clean", "codex-rs/rollout/src/lib.rs", "codex-rs/rollout/src/patch.rs", "codex-rs/rollout/src/list.rs", "codex-rs/cli/src/ctf_cmd.rs", "codex-rs/rollout/src/tests.rs"]
depends_on = ["a1"]
done_when = "`codex ctf clean` 能对目标 rollout 执行拒绝检测、主消息/冗余副本替换、reasoning 删除、`--dry-run` 预览与默认备份，且清理后的会话文件可继续被现有恢复链路读取。"
validate_by = "cd /workspace/codex-rs && cargo nextest run -p codex-rollout"
regress_by = "cd /workspace/codex-rs && cargo nextest run -p codex-core --test all integration_creates_and_checks_session_file --quiet"
regress_timing = "before_fanout"
status = "todo"
validate_status = "not_run"
regress_status = "not_run"
notes = "实现优先采用逐行 JSONL + `serde_json::Value` 定点修改，避免强类型整文件回写丢失未知字段；默认必须打印目标文件与备份路径。"

[[issue]]
id = "a3"
sequence = 30
title = "接入 `codex ctf resume` / `codex ctf r` 的 clean-then-resume 流程"
scope = """
本 issue 负责为 `ctf` 命令族新增恢复入口，复用现有 resume 的会话选择/恢复体验，并在选中目标会话后对 CTF 会话执行显式的 clean-then-resume 流程。

包括：`codex ctf resume` 与别名 `codex ctf r` 的命令接线、CTF 会话识别、恢复前的清理触发与可见提示、以及与 `ctf clean` 的能力复用。
不包括普通 `codex resume` 的 CTF 特化逻辑，不包括静默自动 clean，也不包括新的交互式 UI 形态。
"""
touch_points = ["module:cli", "command:codex ctf resume", "command:codex ctf r", "codex-rs/cli/src/main.rs", "codex-rs/cli/src/ctf_cmd.rs", "codex-rs/tui", "codex-rs/core/tests/suite/cli_stream.rs"]
depends_on = ["a1", "a2"]
done_when = "`codex ctf resume` / `codex ctf r` 可复用现有恢复体验选择会话；当目标为 CTF 会话时，会在用户可见的前提下执行 clean-then-resume；普通 `codex resume` 行为不回退。"
validate_by = "cd /workspace/codex-rs && cargo nextest run -p codex-cli && cargo nextest run -p codex-core --test all integration_creates_and_checks_session_file --quiet"
regress_by = "node /root/.config/lnk/.agents/skills/using-cadence/scripts/cadence_validate.js issue .agents/issues/2026-04-07-ctf-subcommand.toml"
regress_timing = "after_done"
status = "todo"
validate_status = "not_run"
regress_status = "not_run"
notes = "恢复前触发 clean 必须显式、可观察、可关闭；如果无法平滑复用现有 resume 选择器，需要在执行前回看是否属于计划约定内的最小扩展。"
