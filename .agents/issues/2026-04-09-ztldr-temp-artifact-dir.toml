[[issue]]
id = "a1"
sequence = 10
title = "收敛 ztldr runtime/cache 路径并迁出项目根 .tldr"
scope = """
本 issue 负责把 semantic cache 的默认落盘路径从 `project_root/.tldr/cache/semantic/<language>/` 迁移到系统运行时目录或系统临时目录下的项目隔离路径，并复用现有的项目哈希/运行时目录策略，避免 `ztldr` 首次建索引时污染项目根目录。

包括 `codex-rs/native-tldr` 中与 semantic cache 路径解析、目录创建和磁盘复用直接相关的实现与测试。
不包括 `.tldrignore` 的位置和语义调整，不包括 daemon socket/pid/lock 现有路径策略改动，也不包括新增缓存管理命令或新的持久化配置面。
"""
touch_points = ["codex-rs/native-tldr/src/semantic_cache.rs", "codex-rs/native-tldr/src/daemon.rs", "codex-rs/native-tldr/src/semantic.rs"]
depends_on = []
done_when = "semantic cache 默认不再写入项目根 `.tldr/`，而是写入系统运行时目录或系统临时目录下的项目隔离路径；相同项目仍能复用磁盘缓存，且现有 daemon artifact 路径行为未被回归破坏。"
validate_by = "cd /workspace/codex-rs && cargo nextest run -p codex-native-tldr load_or_build_index_persists_and_reuses_disk_cache daemon_status_reports_config_and_reindex_state --quiet"
regress_by = "cd /workspace/codex-rs && cargo nextest run -p codex-native-tldr --quiet"
regress_timing = "before_fanout"
status = "done"
validate_status = "passed"
regress_status = "passed"
notes = "已完成默认 semantic cache 路径迁移：`semantic_cache` 现复用 daemon 的项目级 runtime artifact 目录，不再向项目根写入 `.tldr/`。本地执行 `just native-tldr-test-fast`，137/137 通过，覆盖了缓存复用、新增路径测试与 daemon 相关回归。执行期 capability 使用 `ztldr` 做路径/调用定位；未使用子代理。"

