[[issue]]
id = "a1"
sequence = 10
title = "把 zmemory 默认路径从全局根改为项目级路径"
scope = """
调整 `codex-rs/zmemory` 的默认路径解析合同：当 `[zmemory].path` 未显式配置时，不再使用单一全局库，
而是基于当前项目稳定解析出的项目锚点生成默认数据库路径。优先复用现有 `resolve_workspace_base`
与 repo root / cwd 解析逻辑；如果仓库里没有可直接复用的稳定 `project-id` API，只允许补一个最小 helper。
不在本 issue 中修改显式 `[zmemory].path` 的相对/绝对路径解析规则，也不在本 issue 中收口文档。
"""
touch_points = [
  "module:codex-zmemory",
  "codex-rs/zmemory/src/path_resolution.rs",
  "codex-rs/zmemory/src/config.rs"
]
depends_on = []
done_when = "未显式配置 `[zmemory].path` 时，zmemory 默认数据库稳定落到项目级路径；相同 repo root 与其 worktree 不会生成彼此冲突或漂移的默认路径；显式路径解析合同保持不变"
validate_by = "更新路径解析相关测试后，运行仓库现有命令 cargo test -p codex-zmemory --quiet"
regress_by = "none"
regress_timing = "after_done"
status = "done"
validate_status = "passed"
regress_status = "not_needed"
notes = "本轮由主代理直接执行：当前改动集中在 `codex-zmemory` 默认路径合同，拆给子代理收益不高；可用能力适配结论为 none-applicable。实现前已按用户要求重新读取将要修改的文件。已完成：默认路径从全局根切到 `$CODEX_HOME/zmemory/projects/<project-key>/zmemory.db`，默认 project key 基于 canonical workspace base 的稳定 slug+sha256 前缀生成；相同 repo root 与 worktree 会复用同一默认 DB，显式 `[zmemory].path` 的相对/绝对路径合同保持不变。验证：`cargo test -p codex-zmemory --quiet` 通过。自审：未修改显式路径解析逻辑，默认 project key 只依赖稳定项目锚点。"

