3. 状态测试：执行 `codex mission status` 验证可以显示状态（初始为空）
4. 结构检查：确认 mission_cmd.rs、mission/mod.rs、mission/state.rs、mission/error.rs 文件存在且包含必要的数据结构定义
"""
regress_by = """
1. 执行 `codex --help` 确保其他 CLI 命令仍然可用
2. 执行 `codex exec --help` 确保现有子命令不受影响
"""
regress_timing = "after_done"
status = "done"
validate_status = "failed"
regress_status = "not_needed"
notes = """
实现已完成，spec-reviewer 与 code-reviewer 本地门禁 PASS。

已完成的非测试型验证：
- `just fmt` 通过。
- `git diff --check` 通过。
- `cargo check -p codex-core --lib` 通过，仅有既有 warning。
- `cargo check -p codex-cli --bin codex --no-default-features` 通过，仅有既有 warning。

未完成/阻断的验证：
- 用户要求先不跑测试，`cargo test -p codex-core mission::` 与 `cargo test -p codex-cli --test mission` 已暂停。
- `cargo build --package codex-cli` 被默认特性链路的 `webrtc-sys` 头文件缺失阻断。
