"""
touch_points = [
  "codex-rs/cli/src/main.rs",
  "codex-rs/cli/src/mission_cmd.rs",
  "codex-rs/core/src/mission/mod.rs",
  "codex-rs/core/src/mission/state.rs",
  "codex-rs/core/src/mission/error.rs",
  "codex-rs/cli/src/Cargo.toml",
  "codex-rs/core/src/Cargo.toml",
]
depends_on = []
done_when = """
`codex mission --help` 可以正常显示帮助信息，`codex mission status` 可以显示 Mission 状态（即使为空），所有基础数据结构定义完整且编译通过。
"""
validate_by = """
1. 编译检查：在 codex-rs 目录执行 `cargo build --package codex-cli` 确保编译通过
