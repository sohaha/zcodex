scope = """
实现 Mission CLI 命令框架和基础数据结构，但不包含 Mission 业务逻辑、状态机、Worker 管理、验证器和知识管理。

负责：
- 在 codex-rs/cli/src/main.rs 中添加 Mission 子命令入口
- 创建 codex-rs/cli/src/mission_cmd.rs 实现 Mission 子命令解析
- 创建 codex-rs/core/src/mission/mod.rs、state.rs、error.rs 定义核心数据结构和错误类型
- 更新相关 Cargo.toml 文件添加新模块
- 实现 `codex mission --help` 显示帮助信息
- 实现 `codex mission status` 显示 Mission 状态（初始版本为空状态）

