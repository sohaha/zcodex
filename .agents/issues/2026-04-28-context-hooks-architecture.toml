[[issue]]
id = "a4"
sequence = 40
title = "实现 ctx 执行工具与大输出索引摘要"
scope = """
实现 `ctx_execute`、`ctx_execute_file`、`ctx_batch_execute` 的 tool spec 与 handler，让模型通过现有 shell/unified exec 路径执行命令并将大输出写入 zcontext 索引，只向模型回传压缩摘要、状态和可检索引用。
执行型 ctx 工具必须复用现有 approval、sandbox、timeout、输出截断和失败可见机制；批量执行是主路径，单次执行是辅助路径。
