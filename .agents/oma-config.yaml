# User Preferences (Optional)
# Project-specific user configuration
#
# This file is optional. Works with defaults if not present.
# CLI priority: --vendor arg > agent_cli_mapping > default_cli > cli-config.yaml's active_vendor > gemini

# Response language setting (ko, en, ja, zh, ...)
language: zh

# Date/time format
date_format: ISO
timezone: Asia/Shanghai

# Default CLI (for single tasks)
default_cli: codex

# Auto-update the oh-my-agent CLI itself in the background when outdated.
# Set to false to disable. Can also be disabled per-shell via OMA_SKIP_VERSION_CHECK=1.
auto_update_cli: true

# Per-agent CLI mapping (multi-CLI mode)
agent_cli_mapping:
  frontend: codex
  backend: codex
  mobile: codex
  qa: codex
  debug: codex
  pm: codex
  architecture: codex
  db: codex
  design: codex
  infra: codex
