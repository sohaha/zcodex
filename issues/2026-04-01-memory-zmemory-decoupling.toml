[[issue]]
id = "a1"
sequence = 10
title = "拆分 native memory 与 zmemory 的 feature / 配置归属"
scope = """
把当前共用的 memory feature 拆成两套独立开关，并完成原生 memory 与 `zmemory` 的配置归属收口。
包含 `codex-rs/features`、`codex-rs/core/src/memories`、`codex-rs/core/src/tools/spec.rs`、`codex-rs/core/src/config/*` 的接线调整，
以及把当前顶层 `zmemory_path` 主入口迁移到独立 `zmemory` 配置块的 breaking change。
不在本 issue 中修改 `zmemory` 的默认落库路径策略，也不在本 issue 中完成文档总收口。
"""
touch_points = [
  "module:codex-features",
  "module:codex-core",
  "codex-rs/features/src/lib.rs",
  "codex-rs/core/src/codex.rs",
  "codex-rs/core/src/config/mod.rs",
  "codex-rs/core/src/config/types.rs",
  "codex-rs/core/src/tools/spec.rs",
  "codex-rs/core/src/tools/spec_tests.rs",
  "codex-rs/core/src/config/config_tests.rs",
  "codex-rs/core/tests/suite/memories.rs"
]
depends_on = []
done_when = "原生 memory startup/prompt 仅受 native memory 自己的 feature 与 `[memories]` 控制，`zmemory` tool 仅受 `zmemory` 自己的 feature 与独立配置块控制，且顶层 `zmemory_path` 不再作为主入口"
validate_by = "更新 feature/config/tool spec 相关测试后，运行仓库现有命令 cargo test -p codex-core config::tests:: --quiet && cargo test -p codex-core tools::spec::tests::zmemory_tool_is_available_by_default --quiet && cargo test -p codex-core tools::spec::tests::zmemory_tool_requires_feature_flag --quiet"
regress_by = "运行仓库现有命令 cargo test -p codex-core --test all suite::memories:: --quiet"
regress_timing = "before_fanout"
status = "done"
validate_status = "passed"
regress_status = "passed"
notes = "用户已确认允许一次性 breaking change；本 issue 需要把新 feature 名称与新配置块名称清楚区分 native memory 与 zmemory，并保持 `[memories]` 只服务原生 memory。本轮由主代理直接执行：当前改动跨 `features/core/config/tools` 多处接线且依赖连续全局判断，拆给子代理会放大集成成本；可用能力适配结论为 none-applicable，原因是当前会话未再次显式授权子代理，而其余能力对这类核心 Rust 接线改造没有直接收益。已完成：把原共用 feature 拆成 `native_memories` 与 `zmemory`，原生 memory startup/prompt/phase2/metrics 仅看 `Feature::NativeMemories`，`zmemory` tool 暴露仅看 `Feature::Zmemory`；同时把顶层 `zmemory_path` 迁移为独立 `[zmemory]` 配置块并更新测试、CLI 接线与 config schema。验证：`just write-config-schema` 通过；`cargo test -p codex-core tools::spec::tests::zmemory_tool_is_available_by_default --quiet` 通过；`cargo test -p codex-core tools::spec::tests::zmemory_tool_requires_feature_flag --quiet` 通过；`cargo test -p codex-core --test all suite::memories:: --quiet` 通过；`cargo test -p codex-core config::tests:: --quiet` 在当前环境两次超时，因此补做更聚焦的 `cargo test -p codex-core test_toml_parsing_zmemory_block --quiet` 并通过。自审：检查残留引用后未发现 `Feature::MemoryTool` 或顶层 `zmemory_path` 主入口仍参与运行时接线。"

