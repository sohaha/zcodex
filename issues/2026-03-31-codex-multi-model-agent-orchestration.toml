notes = "用户已明确允许在当前脏工作区继续（选项 1）。本轮只在 a1 允许范围内做最小改动，并尽量避开已存在的无关修改。由于当前工作区存在大量并行改动，本 issue 由主代理本地执行，避免额外并发写入风险。现已在 `codex-rs/core` 贯通 `spawn_agent` / `spawn_agent` v2 的 `provider` 参数、provider-aware model catalog 选择与 spec 暴露，并把共享 override 逻辑收口到 `multi_agents_common`，同时补了 provider+unknown-model 不应污染配置的回归测试。为避免 cargo 锁，本轮验证使用独立 `CARGO_HOME=/tmp/cargo-home-a1-provider-verify-2` 与 `CARGO_TARGET_DIR=/tmp/cargo-target-a1-provider-verify-2`；已通过 targeted checks：`cargo test -p codex-core --lib spawn_agent_accepts_provider_override_and_uses_provider_catalog --quiet`、`cargo test -p codex-core --lib multi_agent_v2_spawn_accepts_provider_override --quiet`、`cargo test -p codex-core --lib spawn_agent_refreshes_model_catalog_before_falling_back_to_parent_model --quiet`、`cargo test -p codex-core --lib spawn_agent_rejects_provider_override_when_requested_model_is_unknown --quiet`、`cargo test -p codex-core --lib spawn_agent_falls_back_to_parent_model_when_requested_model_is_unknown --quiet`、`cargo test -p codex-core --lib spawn_agent_falls_back_to_parent_model_when_requested_reasoning_is_unsupported --quiet`、`cargo test -p codex-core --test all spawn_agent_role_overrides_requested_model_and_reasoning_settings --quiet`、`cargo test -p codex-core --lib test_build_specs_collab_tools_enabled --quiet`、`cargo test -p codex-core --lib test_build_specs_multi_agent_v2_uses_task_names_and_hides_resume --quiet`。完整 `validate_by` / `regress_by` 规定的 `cargo nextest run -p codex-core` 仍未执行，因此本 issue 先维持 `in_progress` 并等待后续完整回归。"

