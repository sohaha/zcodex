[[issue]]
id = "a2"
sequence = 20
title = "在 codex-core 落地稳定偏好主动写入编排"
scope = """
基于 a1 固化的 contract，在 `codex-core` 增加稳定偏好 write gate，使系统在识别到高确定性长期偏好时，
不再只依赖模型临场决定是否调用 `zmemory`，而是通过受控编排走查重、读取当前活动库、再执行 `create` 或 `update` 的主动写入路径。
需要把现有 `Feature::Zmemory` 接线、tool handler 或相关 orchestration 调用点串起来，并补至少一组端到端验证，证明明确称呼偏好会写入当前活动 `zmemory`。
本 issue 不扩展到所有用户消息的通用偏好抽取，也不改变 `codex zmemory` CLI 的基础动作接口。
"""
touch_points = ["module:codex-core", "codex-rs/core/src/codex.rs", "codex-rs/core/src/tools/handlers/zmemory.rs", "codex-rs/core/tests/suite/zmemory_e2e.rs", "codex-rs/core/src/tools/spec.rs"]
depends_on = ["a1"]
done_when = "在启用 `Feature::Zmemory` 时，系统对明确的稳定称呼偏好具备受控、可验证的主动写入路径；写入前会针对当前活动库执行读/查重，写入后可通过 `core://my_user`、`core://agent` 或 `core://agent/my_user` 读回验证；未启用 `Feature::Zmemory` 时不会错误触发该编排"
