它们分别落到 `core://my_user`、`core://agent`、`core://agent/my_user` 哪条 canonical URI，
以及写入前查重、写入后验证、`create`/`update` 选择的最小规则。允许在 `codex-core` 中补最小 helper、策略枚举或内容模板，
