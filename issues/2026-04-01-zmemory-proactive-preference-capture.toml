status = "done"
validate_status = "passed"
regress_status = "not_needed"
notes = "已完成稳定偏好主动写入编排：`codex-rs/core/src/codex.rs` 在 turn 创建后、正常调度前接入 `capture_stable_preference_memories(...)`，仅在启用 `Feature::Zmemory` 时生效；`codex-rs/core/src/memories/zmemory_preferences.rs` 负责先读 `system://workspace` 确认当前活动库，再读 canonical URI 查重，按需 `create/update` 后回读验证。`codex-rs/core/tests/suite/zmemory_e2e.rs` 已覆盖显式命名偏好会写入 `core://my_user` / `core://agent` / `core://agent/my_user`，以及关闭 feature flag 时不会误写入。local reviewer gate：spec-reviewer PASS，code-reviewer PASS。验证：`CARGO_HOME=/tmp/codex-cargo-home CARGO_TARGET_DIR=/tmp/codex-target-zmemory-pref-1 cargo test -p codex-core --test all zmemory_proactively_captures_explicit_naming_preferences -- --exact` 通过；`CARGO_HOME=/tmp/codex-cargo-home CARGO_TARGET_DIR=/tmp/codex-target-zmemory-pref-2 cargo test -p codex-core --test all zmemory_does_not_proactively_capture_preferences_without_feature_flag -- --exact` 通过；`CARGO_HOME=/tmp/codex-cargo-home CARGO_TARGET_DIR=/tmp/codex-target-zmemory-pref-3 cargo test -p codex-core zmemory_tool_requires_feature_flag -- --exact` 通过；`CARGO_HOME=/tmp/codex-cargo-home CARGO_TARGET_DIR=/tmp/codex-target-zmemory-pref-5 cargo test -p codex-core zmemory_tool_is_available_by_default -- --exact` 通过。基于实现、reviewer gates 与 focused validation，当前 issue 判定完成。"

